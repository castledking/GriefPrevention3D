name: SpigotMC & Modrinth Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 17.4.7)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (skip submissions)'
        required: false
        default: false
        type: boolean
      run_modrinth:
        description: 'Release to Modrinth'
        required: false
        default: true
        type: boolean
      run_spigot:
        description: 'Release to SpigotMC'
        required: false
        default: true
        type: boolean
      run_discord:
        description: 'Send Discord notification'
        required: false
        default: true
        type: boolean

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_modrinth || inputs.run_spigot }}
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_modrinth || inputs.run_spigot }}
        run: chmod +x gradlew

      - name: Build with Gradle
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_modrinth || inputs.run_spigot }}
        run: ./gradlew build -x test

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION=${{ inputs.version }}
          else
            VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Find JAR
        id: find-jar
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_modrinth || inputs.run_spigot }}
        run: |
          JAR=$(find build/libs -name "GriefPrevention3D*.jar" -not -name "*-javadoc.jar" -not -name "*-sources.jar" | head -n1)
          echo "jar=${JAR}" >> $GITHUB_OUTPUT

      # --- Step 1: Modrinth ---
      - name: Release to Modrinth
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_modrinth }}
        env:
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
          REPO_NAME: GriefPrevention3D
          VERSION: ${{ steps.version.outputs.version }}
          JAR_PATH: ${{ steps.find-jar.outputs.jar }}
        run: |
          if [ -z "${{ steps.find-jar.outputs.jar }}" ]; then
            echo "No JAR found, skipping Modrinth"
            exit 0
          fi
          if [ -f ".release/latest/v${{ steps.version.outputs.version }}.md" ]; then
            mkdir -p /tmp/release-notes
            cp ".release/latest/v${{ steps.version.outputs.version }}.md" /tmp/release-notes/
          fi
          node .release/src/modrinth-release.js

      # --- Step 2: SpigotMC ---
      - name: Build Docker image
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_spigot }}
        run: docker build -t spigot-release-automation .release

      - name: Release to SpigotMC
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_spigot }}
        env:
          SPIGOT_USERNAME: ${{ secrets.SPIGOT_USERNAME }}
          SPIGOT_PASSWORD: ${{ secrets.SPIGOT_PASSWORD }}
          SPIGOT_COOKIES: ${{ secrets.SPIGOT_COOKIES }}
          SPIGOT_RESOURCE_IDS: ${{ secrets.SPIGOT_RESOURCE_IDS }}
          REPO_NAME: GriefPrevention3D
          REPO_OWNER: castledking
          VERSION: ${{ steps.version.outputs.version }}
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: |
          MOUNTS=""
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f ".release/latest/v${VERSION}.md" ]; then
            MOUNTS="$MOUNTS -v $(pwd)/.release/latest/v${VERSION}.md:/tmp/release-notes/v${VERSION}.md:ro"
          fi
          docker run --rm --shm-size=2g \
            -e SPIGOT_USERNAME \
            -e SPIGOT_PASSWORD \
            -e SPIGOT_COOKIES \
            -e SPIGOT_RESOURCE_IDS \
            -e REPO_NAME \
            -e REPO_OWNER \
            -e VERSION \
            -e DRY_RUN \
            $MOUNTS \
            spigot-release-automation

      # --- Step 3: Discord ---
      - name: Discord notification
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_discord) }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO_NAME: GriefPrevention3D
          REPO_OWNER: castledking
          VERSION: ${{ steps.version.outputs.version }}
          DISCORD_CONFIG_PATH: .release/discord-updater-webhook.yml
        run: |
          if [ -z "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            echo "No DISCORD_WEBHOOK_URL set, skipping"
            exit 0
          fi
          pip install pyyaml -q
          python3 .release/src/discord-notify.py
