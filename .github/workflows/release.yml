name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build and Upload Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          else
            VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Find JAR file
        id: find-jar
        run: |
          JAR=$(find build/libs -name "GriefPrevention3D*.jar" -not -name "*-javadoc.jar" -not -name "*-sources.jar" | head -n1)
          echo "jar=${JAR}" >> $GITHUB_OUTPUT
          echo "Found JAR: ${JAR}"

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.find-jar.outputs.jar }}
          asset_name: GriefPrevention3D.jar
          asset_content_type: application/java-archive

      - name: Update Release Body from Markdown
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          RELEASE_FILE=".release/v${VERSION}.md"

          if [ -f "$RELEASE_FILE" ]; then
            echo "Found release file: $RELEASE_FILE"
            BODY=$(tail -n +2 "$RELEASE_FILE")

            # Update the release with the markdown content
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github.v3+json" \
              "repos/${{ github.repository }}/releases/${{ github.event.release.id }}" \
              -f body="$BODY"

            echo "Release body updated from markdown"
          else
            echo "Warning: Release file not found at $RELEASE_FILE"
          fi
