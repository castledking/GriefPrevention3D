# Чтобы сменить язык, скопируйте нужный файл messages_XX.yml
# из папки Lang/ в GriefPreventionData/ и переименуйте его:
#   plugins/GriefPreventionData/messages.yml
#
# Плагин загружает сообщения в следующем порядке:
#   1. messages.yml (ваш пользовательский или языковой файл)
#   2. messages_{locale}.yml (согласно GriefPrevention.Locale в config)
#   3. messages_en.yml (резервный)
#
# Формат: используйте $ или & для цветовых кодов.
# Переносы строк: используйте \n в сообщениях.
# ============================================================

