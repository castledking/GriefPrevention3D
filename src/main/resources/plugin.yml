name: GriefPrevention3D
prefix: GriefPrevention3D
main: me.ryanhamshire.GriefPrevention.GriefPrevention
provides: [GriefPrevention]
softdepend:
  [Multiverse-Core, My_Worlds, MystCraft, Transporter, RoyalCommands, MultiWorld, Denizen, CommandHelper, Iris, PlaceholderAPI, Vault]
dev-url: https://github.com/castledking/GriefPrevention3D
version: "${project.version}"
description: The self-service anti-griefing plugin for Minecraft servers — now with full 3D subdivisions
website: https://castled.codes
authors: [castledking, RoboMWM, BigScary]
api-version: "1.13"
folia-supported: true
commands:
  claim:
    description: Command to manage your claim(s)
    usage: /<command>
    permission: griefprevention.claims
  aclaim:
    description: Command to manage administrative claims
    usage: /<command>
    permission: griefprevention.adminclaims
  abandonclaim:
    description: Deletes a claim.
    usage: /<command>
    aliases: [unclaim, declaim, removeclaim, disclaim]
    permission: griefprevention.claims
  abandontoplevelclaim:
    description: Deletes a claim and all its subdivisions.
    usage: /<command>
    permission: griefprevention.claims
  abandonallclaims:
    description: Deletes ALL your claims.
    usage: /<command>
    permission: griefprevention.abandonallclaims
  trust:
    description: Grants a player full access to your claim(s).
    usage: /<command> <player>  Grants a player permission to build.  See also /untrust, /containertrust, /accesstrust, and /permissiontrust.
    aliases: tr
    permission: griefprevention.claims
  untrust:
    description: Revokes a player's access to your claim(s).
    usage: /<command> <player>
    aliases: ut
    permission: griefprevention.claims
  containertrust:
    description: Grants a player access to your claim's containers, crops, animals, bed, buttons, and levers.
    usage: /<command> <player>.  Grants a player access to your inventory, crops, animals, bed, and buttons/levers.
    aliases: ct
    permission: griefprevention.claims
  accesstrust:
    description: Grants a player entry to your claim(s) and use of your bed, buttons, and levers.
    usage: /<command> <player>.  Grants a player access to your bed, buttons, and levers.
    aliases: at
    permission: griefprevention.claims
  permissiontrust:
    description: Grants a player permission to manage the claim trustlist.
    usage: /<command> <player>.  Permits a player /trust and /untrust players in the claim.
    aliases: [pt, managetrust]
    permission: griefprevention.claims
  subdivideclaims:
    description: Switches the shovel tool to subdivision mode, used to subdivide your claims.
    usage: /<command>
    aliases: [sc, subdivideclaim]
    permission: griefprevention.claims
  3dsubdivideclaims:
    description: Switches the shovel tool to 3D subdivision mode, allowing height-limited subclaims.
    usage: /<command>
    aliases: [3dsubdivideclaim, 3dsc, sc3d, subdivide3d, 3dsubdivide]
    permission: griefprevention.3dsubdivideclaims
  3dadminclaims:
    description: Switches the shovel tool to 3D administrative claims mode.
    usage: /<command>
    aliases: [adminclaim3d, adminclaims3d, 3dadminclaim]
    permission: griefprevention.adminclaims
  restrictsubclaim:
    description: Restricts a subclaim, so that it inherits no permissions from the parent claim
    usage: /<command>
    aliases: rsc
    permission: griefprevention.claims
  adjustbonusclaimblocks:
    description: Adds or subtracts bonus claim blocks for a player.
    usage: /<command> <player> <amount>
    permission: griefprevention.adjustclaimblocks
    aliases: acb
  adjustbonusclaimblocksall:
    description: Adds or subtracts bonus claim blocks for all online players.
    usage: /<command> <amount>
    permission: griefprevention.adjustclaimblocks
    aliases: acball
  setaccruedclaimblocks:
    description: Updates a player's accrued claim block total.
    usage: /<command> <player> <amount>
    permission: griefprevention.adjustclaimblocks
    aliases: scb
  deleteclaim:
    description: Deletes the claim you're standing in, even if it's not your claim.
    usage: /<command>
    permission: griefprevention.deleteclaims
  deleteallclaims:
    description: Deletes all of another player's claims.
    usage: /<command> <player>
    permission: griefprevention.deleteclaims
  deleteclaimsinworld:
    description: Deletes all the claims in a world.  Only usable at the server console.
    usage: /<command> <world>
    aliases: [deleteallclaimsinworld, clearclaimsinworld, clearallclaimsinworld]
    permission: griefprevention.deleteclaimsinworld
  deleteuserclaimsinworld:
    description: Deletes all the non-admin claims in a world.  Only usable at the server console.
    usage: /<command> <world>
    aliases: [deletealluserclaimsinworld, clearuserclaimsinworld, clearalluserclaimsinworld]
    permission: griefprevention.deleteclaimsinworld
  adminclaims:
    description: Switches the shovel tool to administrative claims mode.
    usage: /<command>
    permission: griefprevention.adminclaims
    aliases: [ac, aclaims]
  basicclaims:
    description: Switches the shovel tool back to basic claims mode.
    usage: /<command>
    aliases: bc
    permission: griefprevention.claims
  shapedclaims:
    description: Switches the shovel tool to shaped claims mode.
    usage: /<command>
    aliases: [shapedclaim]
    permission: griefprevention.shapedclaims
  mergeclaims:
    description: Merges two claims together. Stand in a claim to start, or click two claim boundaries.
    usage: /<command>
    permission: griefprevention.mergeclaims
    aliases: [mergeclaim]
  extendclaim:
    description: Resizes the land claim you're standing in by pushing or pulling its boundary in the direction you're facing.
    usage: /<command> <numberOfBlocks>
    aliases: [expandclaim, resizeclaim]
    permission: griefprevention.claims
  checkclaimexpiry:
    description: View claim expiration details for a player.
    usage: /<command> <player>
    permission: griefprevention.checkclaimexpiry
    aliases: [claimcheckexpiry, checkclaimexpiration, claimcheckexpiration]
  neighbortrust:
    description: Grants a player neighbor trust to bypass minimum distance checks.
    usage: /<command> <player>
    permission: griefprevention.neighbortrust
    aliases: [distancetrust]
  checkclaimdistance:
    description: Check the minimum distance to nearby claims.
    usage: /<command>
    permission: griefprevention.checkclaimdistance
    aliases: [claimcheckdistance]
  toggleclaimdistance:
    description: Toggle whether all players can bypass minimum distance for your claim.
    usage: /<command>
    permission: griefprevention.toggleclaimdistance
    aliases: [claimtoggledistance]
  trapped:
    description: Ejects you to nearby unclaimed land.  Has a substantial cooldown period.
    usage: /<command>
    permission: griefprevention.trapped
  givepet:
    description: Allows a player to give away a pet he or she tamed.
    usage: /<command> <player>
    permission: griefprevention.givepet
  trustlist:
    description: Lists permissions for the claim you're standing in.
    usage: /<command>
    permission: griefprevention.claims
  ignoreclaims:
    description: Toggles ignore claims mode.
    usage: /<command>
    permission: griefprevention.ignoreclaims
    aliases: ic
  deletealladminclaims:
    description: Deletes all administrative claims. Only usable at the server console.
    usage: /<command>
    permission: griefprevention.adminclaims
  adminclaimslist:
    description: Lists all administrative claims.
    usage: /<command>
    permission: griefprevention.adminclaims
  transferclaim:
    description: Converts an administrative claim to a private claim.
    usage: /<command> <player>
    aliases: giveclaim
    permission: griefprevention.transferclaim
  makeadmin:
    description: Converts the claim you're standing in to an administrative claim.
    usage: /<command>
    permission: griefprevention.adminclaims.convert
  makebasic:
    description: Converts the administrative claim you're standing in to a basic claim you own.
    usage: /<command>
    permission: griefprevention.adminclaims.convert
  unlockdrops:
    description: Allows other players to pick up the items you dropped when you died.
    usage: /<command>
    permission: griefprevention.unlockdrops
  claimslist:
    description: Lists information about a player's claim blocks and claims.
    usage: /<command> or /<command> <player>
    aliases: [claimlist, listclaims]
    permission: griefprevention.claims
  claimexplosions:
    description: Toggles whether explosives may be used in a specific land claim.
    usage: /<command> [on|off]
    permission: griefprevention.claims
    aliases: claimexplosion
  witherexplosions:
    description: Toggles whether wither explosions may damage a specific land claim.
    usage: /<command> [on|off]
    permission: griefprevention.witherexplosions
    aliases: witherexplosion
  softmute:
    description: Toggles whether a player's messages will only reach other soft-muted players.
    usage: /<command> <player>
    permission: griefprevention.softmute
  gpreload:
    description: Reloads Grief Prevention's configuration settings.  Does NOT totally reload the entire plugin.
    usage: /<command>
    permission: griefprevention.reload
  gpdebug:
    description: Toggles Grief Prevention debug logging.
    usage: /<command> [on|off]
    permission: griefprevention.debug
  ignoreplayer:
    description: Ignores another player's chat messages.
    usage: /<command> <player name>
    aliases: [ignore]
    permission: griefprevention.ignore
  unignoreplayer:
    description: Unignores another player's chat messages.
    usage: /<command> <player name>
    aliases: [unignore]
    permission: griefprevention.ignore
  ignoredplayerlist:
    description: Lists the players you're ignoring in chat.
    usage: /<command>
    aliases: [ignores, ignored, ignorelist, ignoredlist, listignores, listignored, ignoring]
    permission: griefprevention.ignore
  separate:
    description: Forces two players to ignore each other in chat.
    usage: /<command> <player1> <player2>
    permission: griefprevention.separate
  unseparate:
    description: Reverses /separate.
    usage: /<command> <player1> <player2>
    permission: griefprevention.separate
  claimbook:
    description: Gives a player a manual about claiming land.
    usage: /<command> <player>
    permission: griefprevention.claimbook
  buyclaimblocks:
    description: Purchase additional claim blocks with server currency.
    usage: /<command> [amount]
    permission: griefprevention.buysellclaimblocks
    aliases: buyclaim
  sellclaimblocks:
    description: Sell claim blocks for server currency.
    usage: /<command> [amount]
    permission: griefprevention.buysellclaimblocks
  restorenature:
    description: Switches the shovel tool to restoration mode.
    usage: /<command>
    permission: griefprevention.restorenature
    aliases: rn
  restorenatureaggressive:
    description: Switches the shovel tool to aggressive restoration mode.
    usage: /<command>
    permission: griefprevention.restorenatureaggressive
    aliases: rna
  restorenaturefill:
    description: Switches the shovel tool to fill mode.
    usage: /<command> [radius]
    permission: griefprevention.restorenatureaggressive
    aliases: rnf

permissions:
  griefprevention.createclaims:
    description: Grants permission to create claims.
    default: true
  griefprevention.createclaims.toolbypass:
    description: Allows a player to create claims via command without holding the modification tool.
    default: true
  griefprevention.witherexplosions:
    description: Grants permission to toggle wither explosions in claims.
    default: true
  griefprevention.accruals:
    description: Allows a player to accrue claim blocks at the configured hourly rate.
    default: true
  griefprevention.accruals.afkbypass:
    description: Allows a player to accrue claim blocks while idle.
    default: op
  griefprevention.admin.*:
    description: Grants all administrative functionality.
    children:
      griefprevention.ignoreclaims: true
      griefprevention.adminclaims: true
      griefprevention.adminclaims.convert: true
      griefprevention.adjustclaimblocks: true
      griefprevention.deleteclaims: true
      griefprevention.spam: true
      griefprevention.lava: true
      griefprevention.eavesdrop: true
      griefprevention.deathblow: true
      griefprevention.softmute: true
      griefprevention.reload: true
      griefprevention.debug: true
      griefprevention.visualizenearbyclaims: true
      griefprevention.overrideclaimcountlimit: true
      griefprevention.transferclaim: true
      griefprevention.claimslistother: true
      griefprevention.separate: true
      griefprevention.eavesdrop.signs: true
      griefprevention.eavesdrop.pm: true
      griefprevention.eavesdrop.softmute: true
      griefprevention.claimbook: true
      griefprevention.notignorable: true
      griefprevention.seeinactivity: true
      griefprevention.accruals.afkbypass: true
      griefprevention.eavesdrop.immune: true
      griefprevention.deleteclaimsinworld: true
      griefprevention.unlockothersdrops: true
      griefprevention.seeclaimsize: true
      griefprevention.restorenature: true
      griefprevention.restorenatureaggressive: true
      griefprevention.checkclaimexpiry: true
      griefprevention.dontexpire: true
  griefprevention.extendclaim.toolbypass:
    description: Allows a player to extend a claim without a modification tool.
    default: op
  griefprevention.unlockdrops:
    description: Grants permission to use /unlockdrops.
    default: true
  griefprevention.unlockothersdrops:
    description: Grants permission to use /unlockdrops for other players.
    default: op
  griefprevention.trapped:
    description: Grants permission to use /trapped.
    default: true
  griefprevention.givepet:
    description: Grants permission to use /givepet.
    default: true
  griefprevention.claimslistother:
    description: Grants permission to use /claimslist to get another player's information.
    default: op
  griefprevention.transferclaim:
    description: Grants permission to use /transferclaim.
    default: op
  griefprevention.ignoreclaims:
    description: Grants permission to use /ignoreclaims.
    default: op
  griefprevention.adminclaims:
    description: Grants permission to create administrative claims.
    default: op
  griefprevention.adminclaims.convert:
    description: Grants permission to convert claims between basic and administrative ownership.
    default: op
  griefprevention.deleteclaims:
    description: Grants permission to delete other players' claims.
    default: op
  griefprevention.adjustclaimblocks:
    description: Grants permission to add or remove bonus blocks from a player's account.
    default: op
  griefprevention.spam:
    description: Grants permission to log in, send messages, and send commands rapidly.
    default: op
  griefprevention.lava:
    description: Grants permission to place lava near the surface and outside of claims.
    default: op
  griefprevention.eavesdrop:
    description: Allows a player to see whispered chat messages (/tell) and softmuted messages.
    default: op
  griefprevention.eavesdrop.pm:
    description: Allows a player to see whispered chat messages (/tell).
    default: op
  griefprevention.eavesdrop.softmute:
    description: Allows a player to see softmuted messages.
    default: op
  griefprevention.eavesdrop.signs:
    description: Allows a player to see sign placements as chat messages.
    default: op
  griefprevention.reload:
    description: Grants access to /gpreload.
    default: op
  griefprevention.debug:
    description: Grants access to /gpdebug.
    default: op
  griefprevention.softmute:
    description: Grants access to /softmute.
    default: op
  griefprevention.claims:
    description: Grants access to claim-related slash commands.
    default: true
    children:
      griefprevention.trust: true
      griefprevention.untrust: true
      griefprevention.containertrust: true
      griefprevention.accesstrust: true
      griefprevention.permissiontrust: true
      griefprevention.neighbortrust: true
      griefprevention.distancetrust: true
      griefprevention.checkclaimdistance: true
      griefprevention.toggleclaimdistance: true
      griefprevention.claimslist: true
      griefprevention.abandonclaim: true
      griefprevention.abandontoplevelclaim: true
      griefprevention.extendclaim: true
      griefprevention.subdivideclaims: true
      griefprevention.restrictsubclaim: true
      griefprevention.basicclaims: true
      griefprevention.claimexplosions: true
      griefprevention.checkclaimexpiry: true
      griefprevention.shapedclaims: true
      griefprevention.mergeclaims: true
      griefprevention.3dsubdivideclaims: true
      griefprevention.buysellclaimblocks: true
      griefprevention.witherexplosions: true
      griefprevention.unlockdrops: true
      griefprevention.trapped: true
      griefprevention.givepet: true
      griefprevention.createclaims: true
      griefprevention.accruals: true
      griefprevention.ignore: true
      griefprevention.abandonallclaims: true
      griefprevention.visualizenearbyclaims: true
  griefprevention.trust:
    description: Grants permission to use /trust.
    default: true
  griefprevention.untrust:
    description: Grants permission to use /untrust.
    default: true
  griefprevention.containertrust:
    description: Grants permission to use /containertrust.
    default: true
  griefprevention.accesstrust:
    description: Grants permission to use /accesstrust.
    default: true
  griefprevention.permissiontrust:
    description: Grants permission to use /permissiontrust.
    default: true
  griefprevention.neighbortrust:
    description: Grants permission to use /neighbortrust and /distancetrust.
    default: true
  griefprevention.distancetrust:
    description: Grants permission to use /distancetrust (alias for /neighbortrust).
    default: true
  griefprevention.checkclaimdistance:
    description: Grants permission to use /checkclaimdistance.
    default: true
  griefprevention.toggleclaimdistance:
    description: Grants permission to use /toggleclaimdistance.
    default: true
  griefprevention.claimslist:
    description: Grants permission to use /claimslist.
    default: true
  griefprevention.abandonclaim:
    description: Grants permission to use /abandonclaim.
    default: true
  griefprevention.abandontoplevelclaim:
    description: Grants permission to use /abandontoplevelclaim.
    default: true
  griefprevention.extendclaim:
    description: Grants permission to use /extendclaim.
    default: true
  griefprevention.subdivideclaims:
    description: Grants permission to use /subdivideclaims.
    default: true
  griefprevention.restrictsubclaim:
    description: Grants permission to use /restrictsubclaim.
    default: true
  griefprevention.basicclaims:
    description: Grants permission to use /basicclaims.
    default: true
  griefprevention.claimexplosions:
    description: Grants permission to use /claimexplosions.
    default: true
  griefprevention.abandonallclaims:
    description: Grants access to /abandonallclaims.
    default: true
  griefprevention.visualizenearbyclaims:
    description: Allows a player to see all nearby claims at once.
    default: true
  griefprevention.seeclaimsize:
    description: Allows a player to see claim size for other players claims when right clicking with investigation tool
    default: op
  griefprevention.overrideclaimcountlimit:
    description: Allows players to create more claims than the limit specified by the config.
    default: op
  griefprevention.separate:
    description: Grants access to /separate and /unseparate.
    default: op
  griefprevention.ignore:
    description: Grants access to /ignore, /unignore, and /ignorelist
    default: true
  griefprevention.claimbook:
    description: Grants access to /claimbook.
    default: op
  griefprevention.notignorable:
    description: Players with this permission can't be ignored.
    default: op
  griefprevention.checkclaimexpiry:
    description: Allows checking claim expiration information.
    default: false
  griefprevention.dontexpire:
    description: Prevents a player's claims from expiring.
    default: op
  griefprevention.seeinactivity:
    description: Players with this permission can see how long a claim owner has been offline.
    default: op
  griefprevention.eavesdropimmune:
    description: Players with this permission can't have their private messages eavesdropped.
    default: op
  griefprevention.premovementchat:
    description: Players with this permission can chat before moving.
    default: false
  griefprevention.buysellclaimblocks:
    description: Grants permission to buy and sell claim blocks.
    default: true
  griefprevention.restorenature:
    description: Grants permission to use /restorenature to restore areas to nature.
    default: op
  griefprevention.restorenatureaggressive:
    description: Grants permission to use /restorenatureaggressive and /restorenaturefill.
    default: op
  griefprevention.shapedclaims:
    description: Grants permission to use /shapedclaims and /claim mode shaped.
    default: true
  griefprevention.mergeclaims:
    description: Grants permission to use /mergeclaims.
    default: true
  griefprevention.3dsubdivideclaims:
    description: Grants permission to use /3dsubdivideclaims and /claim mode 3d.
    default: true
