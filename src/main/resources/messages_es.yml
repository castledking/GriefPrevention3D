# ============================================================
# GriefPrevention - Mensajes en español
# ============================================================
# Para cambiar el idioma, copia el archivo messages_XX.yml deseado
# desde la carpeta Lang/ a GriefPreventionData/ y renómbralo:
#   plugins/GriefPreventionData/messages.yml
#
# El plugin carga los mensajes en este orden:
#   1. messages.yml (tu archivo personalizado o de idioma)
#   2. messages_{locale}.yml (según GriefPrevention.Locale en config)
#   3. messages_en.yml (respaldo)
#
# Formato: usa $ o & para códigos de color.
# Saltos de línea: usa \n en los mensajes.
# ============================================================

