# ============================================================
# GriefPrevention - Mesej dalam Bahasa Melayu
# ============================================================
# Untuk menukar bahasa, salin fail messages_XX.yml yang dikehendaki
# daripada folder Lang/ ke GriefPreventionData/ dan namakan semula:
#   plugins/GriefPreventionData/messages.yml
#
# Plugin memuatkan mesej mengikut susunan ini:
#   1. messages.yml (fail tersuai atau fail bahasa anda)
#   2. messages_{locale}.yml (berdasarkan GriefPrevention.Locale dalam config)
#   3. messages_en.yml (fallback)
#
# Format: guna $ atau & untuk kod warna.
# Baris baharu: guna \n dalam mesej.
# ============================================================

