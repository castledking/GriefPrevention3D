# ============================================================
# GriefPrevention - Mensagens em Português (Brasil)
# ============================================================
# Para mudar o idioma, copie o arquivo messages_XX.yml desejado
# da pasta Lang/ para GriefPreventionData/ e renomeie:
#   plugins/GriefPreventionData/messages.yml
#
# O plugin carrega as mensagens nesta ordem:
#   1. messages.yml (seu arquivo personalizado ou de idioma)
#   2. messages_{locale}.yml (baseado em GriefPrevention.Locale no config)
#   3. messages_en.yml (fallback)
#
# Formato: use $ ou & para códigos de cores.
# Quebras de linha: use \n nas mensagens.
# ============================================================

