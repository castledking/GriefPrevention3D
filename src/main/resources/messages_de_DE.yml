# ============================================================
# GriefPrevention - Nachrichten auf Deutsch
# ============================================================
# Um die Sprache zu ändern, kopiere die gewünschte Datei messages_XX.yml
# aus dem Lang/-Ordner in GriefPreventionData/ und benenne sie um:
#   plugins/GriefPreventionData/messages.yml
#
# Das Plugin lädt die Nachrichten in dieser Reihenfolge:
#   1. messages.yml (deine benutzerdefinierte oder Sprachdatei)
#   2. messages_{locale}.yml (gemäß GriefPrevention.Locale in config)
#   3. messages_en.yml (Fallback)
#
# Format: Verwende $ oder & für Farbcodes.
# Zeilenumbrüche: Verwende \n in Nachrichten.
# ============================================================

