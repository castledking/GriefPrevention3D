# ============================================================
# GriefPrevention - 日本語メッセージ
# ============================================================
# 言語を変更するには、Lang/ フォルダから目的の messages_XX.yml ファイルを
# GriefPreventionData/ にコピーし、名前を変更します：
#   plugins/GriefPreventionData/messages.yml
#
# プラグインは次の順序でメッセージを読み込みます：
#   1. messages.yml（カスタマイズまたはロケールファイル）
#   2. messages_{locale}.yml（設定の GriefPrevention.Locale に基づく）
#   3. messages_en.yml（フォールバック）
#
# 書式：色コードには $ または & を使用します。
# 改行：メッセージ内では \n を使用します。
# ============================================================

