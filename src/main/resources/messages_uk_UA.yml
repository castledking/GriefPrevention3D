# ============================================================
# GriefPrevention - Повідомлення українською
# ============================================================
# Щоб змінити мову, скопіюйте потрібний файл messages_XX.yml
# з папки Lang/ до GriefPreventionData/ та перейменуйте його:
#   plugins/GriefPreventionData/messages.yml
#
# Плагін завантажує повідомлення в такому порядку:
#   1. messages.yml (ваш користувацький або мовний файл)
#   2. messages_{locale}.yml (згідно GriefPrevention.Locale в config)
#   3. messages_en.yml (резервний)
#
# Формат: використовуйте $ або & для кодів кольорів.
# Розриви рядків: використовуйте \n у повідомленнях.
# ============================================================

