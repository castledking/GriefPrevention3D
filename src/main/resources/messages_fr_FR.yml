# ============================================================
# GriefPrevention - Messages en français
# ============================================================
# Pour changer la langue, copiez le fichier messages_XX.yml souhaité
# depuis le dossier Lang/ vers GriefPreventionData/ et renommez-le :
#   plugins/GriefPreventionData/messages.yml
#
# Le plugin charge les messages dans cet ordre :
#   1. messages.yml (votre fichier personnalisé ou de langue)
#   2. messages_{locale}.yml (selon GriefPrevention.Locale dans config)
#   3. messages_en.yml (secours)
#
# Format : utilisez $ ou & pour les codes couleur.
# Sauts de ligne : utilisez \n dans les messages.
# ============================================================

