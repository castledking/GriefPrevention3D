# ============================================================
# GriefPrevention - Komunikaty w języku polskim
# ============================================================
# Aby zmienić język, skopiuj odpowiedni plik messages_XX.yml
# z folderu Lang/ do GriefPreventionData/ i zmień jego nazwę:
#   plugins/GriefPreventionData/messages.yml
#
# Wtyczka ładuje komunikaty w następującej kolejności:
#   1. messages.yml (twój spersonalizowany plik językowy)
#   2. messages_{locale}.yml (zgodnie z GriefPrevention.Locale w config)
#   3. messages_en.yml (zapasowy)
#
# Format: użyj $ lub & dla kodów kolorów.
# Nowe linie: użyj \n w komunikatach.
# ============================================================

