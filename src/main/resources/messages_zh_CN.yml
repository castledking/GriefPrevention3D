# ============================================================
# GriefPrevention - 简体中文消息
# ============================================================
# 要更改语言，请将所需 messages_XX.yml 文件从 Lang/ 文件夹复制到
# GriefPreventionData/ 并重命名：
#   plugins/GriefPreventionData/messages.yml
#
# 插件按以下顺序加载消息：
#   1. messages.yml（自定义或本地化文件）
#   2. messages_{locale}.yml（基于配置中的 GriefPrevention.Locale）
#   3. messages_en.yml（后备）
#
# 格式：使用 $ 或 & 作为颜色代码。
# 换行：在消息中使用 \n。
# ============================================================

