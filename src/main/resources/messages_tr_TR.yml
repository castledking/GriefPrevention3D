# ============================================================
# GriefPrevention - Türkçe mesajlar
# ============================================================
# Dili değiştirmek için istediğiniz messages_XX.yml dosyasını
# Lang/ klasöründen GriefPreventionData/ klasörüne kopyalayın
# ve adını şu şekilde değiştirin:
#   plugins/GriefPreventionData/messages.yml
#
# Eklenti mesajları şu sırayla yükler:
#   1. messages.yml (özel veya dil dosyanız)
#   2. messages_{locale}.yml (config'deki GriefPrevention.Locale'ye göre)
#   3. messages_en.yml (yedek)
#
# Biçim: Renk kodları için $ veya & kullanın.
# Satır sonları: Mesajlarda \n kullanın.
# ============================================================

